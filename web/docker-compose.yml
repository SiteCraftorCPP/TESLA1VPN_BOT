
# Docker Compose для локальной разработки/тестирования
# Для production используйте готовые образы или настройте Caddy/Nginx
# См. README.md раздел "Настройка прокси для production"

services:
  cabinet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME}
        VITE_APP_NAME: ${VITE_APP_NAME:-Cabinet}
        VITE_APP_LOGO: ${VITE_APP_LOGO:-V}
    container_name: cabinet_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /opt/tesla1vpn/web/static/miniapp/redirect.html:/usr/share/nginx/html/miniapp/redirect.html:ro
    ports:
      - '${CABINET_PORT:-3020}:80'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
